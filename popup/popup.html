<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Always Open PDFs</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      width: 240px;
      padding: 12px;
      margin: 0;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 10px;
      text-align: center;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      background: #e8f5e9;
      color: #2e7d32;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #1976d2;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #125aa3;
    }

    .footer {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      color: #888;
    }
  </style>
</head>

<body>

  <h2>Always Open PDFs</h2>

  <div class="status" id="status">
    Loading...
  </div>

  <button id="toggleBtn">Toggle</button>

  <div class="footer">
    PDF opener extension
  </div>

  <script src="popup.js"></script>

</body>
</html>
